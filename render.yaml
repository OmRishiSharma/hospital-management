services:
  # Backend API Server
  - type: web
    name: hms-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PORT
        value: 10000

  # Frontend Web Client
  - type: static
    name: hms-client
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hms-server
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
